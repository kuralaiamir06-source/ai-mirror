<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Mirror App 💗</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>

<style>
/* =====================
   GLOBAL THEME (PINK FEMININE)
===================== */

body {
    margin: 0;
    font-family: 'Poppins', Arial, sans-serif;
    background: linear-gradient(135deg, #ffe4f1, #ffd1dc, #ffc2e2);
    color: #4a004a;
    text-align: center;
    min-height: 100vh;
}

/* NAV BAR */
nav {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(255, 182, 193, 0.4);
}

nav button {
    padding: 12px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #ff6fa3, #ff9ec4);
    color: white;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
    transition: 0.3s;
}

nav button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #ff4f91, #ff7fb0);
}

/* SECTIONS */
.section {
    display: none;
    padding: 30px;
    animation: fadeIn 0.6s ease;
}

.active {
    display: block;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* CARDS */
.card {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 20px;
    margin: 15px auto;
    width: 80%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
}

/* BUTTONS */
button {
    padding: 12px 18px;
    margin: 8px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #ff7eb3, #ffb6d5);
    color: white;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(255, 105, 180, 0.2);
}

button:hover {
    transform: scale(1.05);
}

/* CAMERA */
.video-box {
    position: relative;
    display: inline-block;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
}

video, canvas {
    border-radius: 25px;
}

canvas {
    position: absolute;
    left: 0;
    top: 0;
}

/* TEXT STYLES */
h1, h2 {
    color: #c2185b;
}

p {
    font-size: 16px;
}
</style>
</head>

<body>

<nav>
    <button onclick="show('home')">💗 Home</button>
    <button onclick="show('scan')">✨ Face Scan</button>
    <button onclick="show('ar')">💄 AR Tutorial</button>
    <button onclick="show('profile')">👩 Profile</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
    <div class="card">
        <h1>💗 AI Mirror Assistant</h1>
        <p>Beautiful real-time beauty AI with AR makeup guidance ✨</p>
    </div>
</div>

<!-- FACE SCAN -->
<div id="scan" class="section">
    <div class="card">
        <h2>✨ Face Scan</h2>
        <button onclick="startCamera()">Start Camera</button>
        <button onclick="analyzeFace()">Analyze 💕</button>
        <p id="result"></p>
    </div>
</div>

<!-- AR -->
<div id="ar" class="section">
    <div class="card">
        <h2>💄 AR Makeup Tutorial</h2>

        <div class="video-box">
            <video id="video" width="320" height="400" autoplay></video>
            <canvas id="canvas" width="320" height="400"></canvas>
        </div>

        <br />
        <button onclick="startAR()">Start AR ✨</button>
    </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <div class="card">
        <h2>👩 Profile</h2>
        <p id="profileData">No saved data yet 💗</p>
        <button onclick="loadProfile()">Load Profile</button>
    </div>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let model;
let stream;

// NAV
function show(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// CAMERA
async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

// FAKE AI
function analyzeFace() {
    const tones = ["Warm 💛", "Cool 💙", "Neutral 🤍"];
    const shapes = ["Oval 💗", "Round 💕", "Square 💄"];

    const result = {
        tone: tones[Math.floor(Math.random() * tones.length)],
        shape: shapes[Math.floor(Math.random() * shapes.length)]
    };

    document.getElementById("result").innerText =
        "Skin tone: " + result.tone + " | Face shape: " + result.shape;

    localStorage.setItem("profile", JSON.stringify(result));
}

// PROFILE
function loadProfile() {
    const data = localStorage.getItem("profile");
    if (data) {
        const p = JSON.parse(data);
        document.getElementById("profileData").innerText =
            "Saved 💗 Tone: " + p.tone + ", Shape: " + p.shape;
    }
}

// AR
async function startAR() {
    await startCamera();

    model = await faceLandmarksDetection.load(
        faceLandmarksDetection.SupportedPackages.mediapipeFacemesh
    );

    detect();
}

async function detect() {
    const predictions = await model.estimateFaces({ input: video });

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (predictions.length > 0) {
        const keypoints = predictions[0].scaledMesh;

        // lips glow
        ctx.fillStyle = "rgba(255, 105, 180, 0.35)";
        const lips = [61,146,91,181,84,17,314,405,321,375,291,308];

        ctx.beginPath();
        lips.forEach((i, index) => {
            const [x, y] = keypoints[i];
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.fill();
    }

    requestAnimationFrame(detect);
}
</script>

</body>
</html>
